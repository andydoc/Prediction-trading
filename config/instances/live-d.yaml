# Live-D: Strategy D in LIVE mode ($100 real capital)
# Derived from shadow-d.yaml + live_trading overrides
# Created 2026-04-21 for v0.20.3 go-live per GO_LIVE_PLAN_V1_STRATEGY_D_100USD.md

arbitrage:
  # Strategy D "High Concentration" parameters (mirrors shadow-d.yaml)
  capital_per_trade_pct: 0.30
  max_concurrent_positions: 8
  # NOTE (audit R-6, 2026-04-21): max_position_size and max_exposure_per_market are
  # enforced by strategy_tracker (shadow portfolios) but NOT by the live execution path.
  # At $100 bankroll the current_capital check in position.rs is the de-facto hard cap.
  # These values are scaled correctly for when the live path is wired up (pre-Milestone F).
  max_position_size: 60          # ~60% of $100 bankroll; not enforced live, correct for shadow
  min_profit_threshold: 0.04
  max_profit_threshold: 0.20
  min_resolution_time_secs: 900
  max_days_to_resolution: 30
  replacement_cooldown_seconds: 120
  max_days_to_replacement: 21
  max_exposure_per_market: 50    # ~50% of $100; not enforced live, correct for shadow

live_trading:
  enabled: true
  shadow_only: false            # REAL ORDERS — Q1=B armed-live per operator decision 2026-04-21
  # 2026-04-22 16:xx UTC: Wallet rotated to 0x37B2…A105 after old key (0x21f1…bfb1)
  # transited the Windows clipboard during a MetaMask re-import step. Unlimited USDC.e
  # approvals set on CTF Exchange, NegRisk Exchange, NegRisk Adapter. Bankroll
  # (~$100 USDC.e) transferred to rotated wallet.
  # 2026-04-22 ~22:00 UTC: Madrid VPS terminated by provider (missed payment).
  # Rebuild underway on Dublin VPS (38.180.151.102). Wallet blockchain state
  # (balance + approvals) persists; CLOB L2 creds will auto-derive on first boot
  # via create_or_derive_api_key against the fresh EOA signature.
  # 2026-04-23 06:38 UTC: First boot on Dublin — DISARMED for validation.
  # Verified: clean start, CLOB L2 creds derived (key=c5a8fcd5...), wallet
  # 0x37B2…A105 has $100.02 USDC.e + 14.47 POL + MAX approvals on all 3
  # exchange contracts, eval loop p50=31μs / p95=727μs, 17 WS shards / 7938
  # assets / 584 hot constraints, 1.7M msgs ingested, 0 errors, dashboard
  # tunnel reachable via Windows ssh after icacls ACL fix.
  # /balance-allowance 401 persists (same pre-existing issue as Madrid;
  # on-chain fallback works).
  # 2026-04-23 ~07:15 UTC: RE-ARMED on operator signal.
  # See docs/INCIDENT_LOG.md.
  execute_orders: true          # G1 executor ARMED — live trading on Dublin
  initial_capital: 100          # $100 USDC.e starting bankroll
  max_capital: 200              # cap auto-sizing; prevents over-allocation on bumper days
  max_positions: 8              # aligned with Strategy D max_concurrent_positions
  low_balance_pause_usd: 10     # pause new entries if available < $10
  gamma_freshness_check: true   # F-pre-7: fresh Gamma call at entry (G7)
  gamma_freshness_timeout_ms: 5000

safety:
  circuit_breaker:
    # R-1 fix (audit 2026-04-21): raised from 0.10 to 0.35.
    # Strategy D observed 34% max drawdown on $1,000 shadow capital.
    # 10% CB would trip on normal Strategy D losing streak, requiring manual restart.
    # 0.35 matches observed envelope; still halts genuine runaway events.
    max_drawdown_pct: 0.35
  gas_monitor:
    # Y-6 fix (audit 2026-04-21): non-zero threshold so CB fires before gas is depleted.
    # At 0.0 the gas trip only fires after cancel orders can no longer be submitted.
    critical_pol_balance: 0.5
  usdc_monitor:
    # B4.6: on-chain USDC.e balance tracker. Required for dashboard "live_balance"
    # and for CB when balance drifts from accounting or drops below critical.
    # Disabled in base config so it doesn't run during pure-shadow operation;
    # enabled here because we are live with real USDC.e on the wallet.
    enabled: true
    # The UsdcMonitorYaml serde default is https://polygon-rpc.com, which is a
    # shared public endpoint that has IP-banned this VPS ("API key disabled,
    # tenant disabled, json-rpc code: -32051"). gas_monitor uses publicnode's
    # polygon-bor-rpc endpoint which works; match it here so eth_call for the
    # USDC.e balanceOf() succeeds.
    rpc_url: https://polygon-bor-rpc.publicnode.com
    check_interval_seconds: 300      # 5 min — tight enough to catch drain events quickly
    drift_threshold: 1.0             # $1 drift from accounting triggers a warning
    warning_balance: 15.0            # warn under $15 available (headroom above $10 pause)
    critical_balance: 5.0            # CB trip under $5 (below low_balance_pause_usd)

notifications:
  hostname: dublin

dashboard:
  port: 5558                    # main live engine port (not 5563 which is shadow-d)
