mode: dual
debug: true
live_trading:
  enabled: true
  shadow_only: true
  initial_capital: 100
  max_capital: 1000
  max_positions: 20
  low_balance_pause_usd: 0
  min_resolution_time_secs: 300
  max_price_drift_pct: 0.05
  min_orderbook_depth_usd: 50
  min_depth_per_leg: 0
  depth_haircut: 0.8
  min_profit_ratio: 0.7
  min_profit_after_fees: 0.03
  fill_check_interval_secs: 2
  order_timeout_secs: 60
arbitrage:
  capital_per_trade_pct: 0.1
  min_trade_size: 10.0
  max_position_size: 1000
  max_exposure_per_market: 500
  max_concurrent_positions: 20
  min_profit_threshold: 0.03
  max_profit_threshold: 0.3
  min_resolution_time_secs: 300
  max_days_to_resolution: 60
  max_days_to_replacement: 30
  replacement_cooldown_seconds: 60
  replace_on_postponement: true
  postponement_replace_breakeven_only: true
  postponement_rescore_days: 14
  resolution_validation:
    enabled: true
    cache_ttl_hours: 168
  optimization:
    algorithm: frank_wolfe
    max_iterations: 100
    tolerance: 0.0001
  fees:
    trading_fee: 0.0001
    polymarket_maker_fee: 0.0
    polymarket_taker_fee: 0.0001
    polymarket_global_fee: 0.0
    fee_on_winnings: false
    crypto_15min_fee: 0.001
    withdrawal_fee: 0.0
fees:
  min_profit_threshold: 0.03
risk:
  max_daily_loss: 500
  max_daily_loss_pct: 0.05
  volatility:
    enabled: true
    lookback_period: 3600
    max_volatility: 0.15
  whale_detection:
    enabled: true
    price_impact_threshold: 0.05
    volume_threshold: 10000
execution:
  strategy: limit_orders
  max_slippage: 0.005
  order_timeout: 60
  max_retries: 3
  retry_delay: 5
constraint_detection:
  detect_types:
  - logical_implication
  - mutual_exclusivity
  - complementary
  - correlated
  min_markets: 2
  max_markets: 5
  min_confidence: 0.7
  min_price_sum: 0.85
  max_price_sum: 1.15
  rebuild_interval: 300
engine:
  max_evals_per_batch: 500
  constraint_rebuild_interval_seconds: 600
  efp_drift_threshold: 0.005
  efp_staleness_seconds: 5.0
  state_save_interval_seconds: 30
  monitor_interval_seconds: 30
  stats_log_interval_seconds: 30
  stale_sweep_interval_seconds: 60
  stale_asset_threshold_seconds: 30
  max_book_staleness_secs: 30
  closed_position_retention_days: 90
  api_resolution_interval_seconds: 300
  latency_instrumentation: true
market_data:
  enabled_markets:
  - polymarket
  poll_interval: 30
  polymarket:
    api_url: https://gamma-api.polymarket.com
    rate_limit: 10
  storage:
    compress: true
    format: json
    retention_days: 30
websocket:
  enabled: true
  market_channel_url: wss://ws-subscriptions-clob.polymarket.com/ws/market
  user_channel_url: wss://ws-subscriptions-clob.polymarket.com/ws/user
  heartbeat_interval: 10
  reconnect_base_delay: 1.0
  reconnect_max_delay: 60.0
  assets_per_shard: 400
  max_book_staleness_secs: 30
  # Tiered WS architecture (Tier B + C)
  use_tiered_ws: true               # Tiered WS enabled (replaces flat sharding)
  max_assets_per_connection: 490    # Hard limit per connection (Polymarket max ~500)
  stagger_ms: 150                   # Delay between connection starts
  tier_b_max_connections: 17        # Max Tier B connections (17 — jitter v2 + biased heartbeat provides sufficient spread)
  tier_b_hysteresis_scans: 3        # Scans a constraint must be cold before unsubscribing
  tier_b_consolidation_threshold: 300  # Assets/conn below which hourly consolidation triggers
  tier_b_top_n_constraints: 500        # Only subscribe to top N constraints by spread/time_to_resolve (0 = no limit)
  tier_c_new_market_buffer_secs: 2.5   # Buffer time for new market event bursts
execution_control:
  enabled: true
  url: http://localhost:5557
communication:
  auto_retry:
    backoff_factor: 2
    enabled: true
    max_retries: 3
  task_check_interval: 30
  urgency_levels:
    high: 60
    low: 3600
    medium: 600
    urgent: 10
monitoring:
  alerts:
    error_count_threshold: 5
    high_exposure_threshold: 0.8
    low_balance_threshold: 1000
  heartbeat_interval: 60
  logging:
    format: '%(asctime)s - %(name)s - %(levelname)s - %(message)s'
    level: DEBUG
    retention: 30
    rotation: daily
    log_dir: logs
    rust_file_prefix: rust_engine
performance:
  cache:
    enabled: true
    max_size_mb: 500
    ttl: 300
  db_pool_size: 10
  worker_threads: 4
workspace:
  brain_inbox: /mnt/c/Users/andyd/ai-workspace/brain-inbox
  data: /home/andydoc/prediction-trader/data
  logs: /home/andydoc/prediction-trader/logs
  results: /mnt/c/Users/andyd/ai-workspace/results
  root: /home/andydoc/prediction-trader
  tasks: /mnt/c/Users/andyd/ai-workspace/tasks
ai:
  provider: anthropic
  api_url: https://api.anthropic.com/v1/messages
  api_version: 2023-06-01
  models:
    resolution_validation: claude-sonnet-4-20250514
    postponement_detection: claude-sonnet-4-20250514
  max_tokens:
    resolution_validation: 256
    postponement_detection: 1024
  postponement:
    enabled: true
    overdue_threshold_hours: 24
    check_interval_hours: 24
    rate_limit_seconds: 60
    max_attempts: 2
    fallback_to_season_end: true
    date_buffer_hours: 24
    cache_ttl_hours: 24
ollama:
  api_key: ollama-local
  base_url: http://127.0.0.1:11434/v1
  context_window: 128000
  max_tokens: 8192
  model: lfm2.5-thinking:1.2b
safety:
  circuit_breaker:
    enabled: true
    max_drawdown_pct: 0.10              # 10% drawdown from peak triggers halt
    max_consecutive_errors: 3           # 3 errors within window triggers halt
    error_window_seconds: 300           # 5-minute sliding window for errors
    api_timeout_seconds: 600            # API unreachable for 10min triggers halt (must exceed 300s API resolution interval)
  gas_monitor:
    enabled: true
    rpc_url: 'https://polygon-rpc.com'
    check_interval_seconds: 3600       # Check every hour
    min_pol_balance: 1.0               # Warning threshold (Telegram alert)
    critical_pol_balance: 0.1          # Critical threshold (trips circuit breaker)
dashboard:
  port: 5558
  bind_addr: '127.0.0.1'
notifications:
  enabled: true
  webhook_url: ''                       # Auto-built from secrets.yaml telegram_bot_token
  api_key: ''
  phone_number: '688371419'             # Telegram chat_id
  rate_limit_seconds: 10
  on_entry: true
  on_resolution: true
  on_error: true
  on_circuit_breaker: true
  on_daily_summary: true
state:
  db_path: data/state_rust.db
